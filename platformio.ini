; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esplolin_c3_mini32dev

; ==========================
; ESP32-C3 — LOLIN C3 Mini (ambiente padrao)
; Usa NimBLE-Arduino (compativel com C3)
; ==========================
[env:esplolin_c3_mini32dev]
platform = espressif32@6.3.2
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200

board_build.partitions = no_ota.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    miguelbalboa/MFRC522@^1.4.10

; ==========================
; ESP32-S3 — DevKit C-1
; Usa NimBLE-Arduino (compativel com S3)
; ==========================
[env:esp32-s3-devkitc-1]
platform = espressif32@6.3.2
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    miguelbalboa/MFRC522@^1.4.10

; ==========================
; ESP32 classico — WROOM / WROVER
; Usa NimBLE-Arduino (tambem compativel com ESP32 classico)
; ==========================
[env:esp32dev]
platform = espressif32@6.3.2
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    miguelbalboa/MFRC522@^1.4.10
